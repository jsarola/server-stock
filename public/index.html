<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestió de Servidors</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0e17;
      --surface: #111827;
      --surface2: #1a2235;
      --border: #1e2d45;
      --accent: #00d4ff;
      --accent2: #7c3aed;
      --green: #10b981;
      --red: #ef4444;
      --yellow: #f59e0b;
      --text: #e2e8f0;
      --text-muted: #64748b;
      --mono: 'IBM Plex Mono', monospace;
      --sans: 'IBM Plex Sans', sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    .app {
      position: relative;
      z-index: 1;
      max-width: 1400px;
      margin: 0 auto;
      padding: 2rem;
    }

    /* Header */
    header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      margin-bottom: 2.5rem;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid var(--border);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .brand-icon {
      width: 42px;
      height: 42px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--mono);
      font-weight: 600;
      font-size: 1.1rem;
      color: white;
    }

    .brand-text h1 {
      font-family: var(--mono);
      font-size: 1.4rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: var(--text);
    }

    .brand-text span {
      font-size: 0.75rem;
      color: var(--text-muted);
      font-family: var(--mono);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    /* Stats bar */
    .stats-bar {
      display: flex;
      gap: 1rem;
      margin-bottom: 2rem;
    }

    .stat-card {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1rem 1.25rem;
      transition: border-color 0.2s;
    }

    .stat-card:hover { border-color: var(--accent); }

    .stat-label {
      font-family: var(--mono);
      font-size: 0.65rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 0.4rem;
    }

    .stat-value {
      font-family: var(--mono);
      font-size: 1.6rem;
      font-weight: 600;
      color: var(--accent);
    }

    .stat-unit {
      font-size: 0.7rem;
      color: var(--text-muted);
      margin-left: 3px;
    }

    /* Toolbar */
    .toolbar {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1.5rem;
    }

    .search-box {
      flex: 1;
      position: relative;
    }

    .search-box input {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.6rem 1rem 0.6rem 2.5rem;
      color: var(--text);
      font-family: var(--mono);
      font-size: 0.85rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .search-box input:focus { border-color: var(--accent); }

    .search-box::before {
      content: '⌕';
      position: absolute;
      left: 0.75rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      font-size: 1.1rem;
    }

    .btn {
      font-family: var(--mono);
      font-size: 0.8rem;
      font-weight: 500;
      padding: 0.6rem 1.2rem;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }

    .btn-primary {
      background: var(--accent);
      color: var(--bg);
    }
    .btn-primary:hover { background: #00b8d9; }

    .btn-danger {
      background: transparent;
      color: var(--red);
      border: 1px solid var(--red);
    }
    .btn-danger:hover { background: var(--red); color: white; }

    .btn-ghost {
      background: transparent;
      color: var(--text-muted);
      border: 1px solid var(--border);
    }
    .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }

    /* Table */
    .table-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    thead {
      background: var(--surface2);
      border-bottom: 1px solid var(--border);
    }

    th {
      font-family: var(--mono);
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-muted);
      padding: 0.9rem 1rem;
      text-align: left;
      font-weight: 500;
      white-space: nowrap;
    }

    tbody tr {
      border-bottom: 1px solid var(--border);
      transition: background 0.15s;
    }

    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: var(--surface2); }

    td {
      padding: 0.85rem 1rem;
      font-size: 0.875rem;
    }

    .cell-name {
      font-family: var(--mono);
      font-weight: 600;
      color: var(--accent);
      font-size: 0.85rem;
    }

    .cell-num {
      font-family: var(--mono);
      color: var(--text);
      text-align: right;
    }

    .cell-num.zero { color: var(--text-muted); }

    .badge {
      display: inline-block;
      padding: 0.15rem 0.6rem;
      border-radius: 999px;
      font-family: var(--mono);
      font-size: 0.7rem;
      font-weight: 500;
    }

    .badge-tipus {
      background: rgba(124,58,237,0.15);
      color: #a78bfa;
      border: 1px solid rgba(124,58,237,0.3);
    }

    .badge-equip {
      background: rgba(16,185,129,0.1);
      color: #34d399;
      border: 1px solid rgba(16,185,129,0.2);
    }

    .badge-servei {
      background: rgba(0,212,255,0.08);
      color: var(--accent);
      border: 1px solid rgba(0,212,255,0.2);
      font-size: 0.68rem;
    }

    .actions { display: flex; gap: 0.5rem; }

    .icon-btn {
      width: 30px;
      height: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: transparent;
      cursor: pointer;
      color: var(--text-muted);
      font-size: 0.85rem;
      transition: all 0.15s;
    }

    .icon-btn:hover.edit { border-color: var(--accent); color: var(--accent); background: rgba(0,212,255,0.08); }
    .icon-btn:hover.delete { border-color: var(--red); color: var(--red); background: rgba(239,68,68,0.08); }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 4rem 2rem;
      color: var(--text-muted);
    }
    .empty-state .icon { font-size: 3rem; margin-bottom: 1rem; }
    .empty-state p { font-family: var(--mono); font-size: 0.85rem; }

    /* Modal */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(4px);
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
    }

    .modal-overlay.open {
      opacity: 1;
      pointer-events: all;
    }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      width: 640px;
      max-width: 95vw;
      max-height: 90vh;
      overflow-y: auto;
      transform: translateY(20px);
      transition: transform 0.2s;
    }

    .modal-overlay.open .modal { transform: translateY(0); }

    .modal-header {
      padding: 1.5rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .modal-title {
      font-family: var(--mono);
      font-size: 1rem;
      font-weight: 600;
    }

    .modal-close {
      width: 30px;
      height: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: transparent;
      cursor: pointer;
      color: var(--text-muted);
      font-size: 1.1rem;
      transition: all 0.15s;
    }

    .modal-close:hover { border-color: var(--red); color: var(--red); }

    .modal-body { padding: 1.5rem; }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }

    .form-group { display: flex; flex-direction: column; gap: 0.4rem; }
    .form-group.full { grid-column: 1 / -1; }

    label {
      font-family: var(--mono);
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    input[type="text"], input[type="number"], input[type="date"] {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 7px;
      padding: 0.55rem 0.8rem;
      color: var(--text);
      font-family: var(--mono);
      font-size: 0.85rem;
      outline: none;
      transition: border-color 0.2s;
      width: 100%;
    }

    input:focus { border-color: var(--accent); }

    .disk-total-hint {
      font-family: var(--mono);
      font-size: 0.7rem;
      color: var(--text-muted);
      margin-top: 0.25rem;
    }

    .modal-footer {
      padding: 1rem 1.5rem;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: flex-end;
      gap: 0.75rem;
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.8rem 1.2rem;
      font-family: var(--mono);
      font-size: 0.8rem;
      display: flex;
      align-items: center;
      gap: 0.6rem;
      z-index: 200;
      transform: translateY(100px);
      opacity: 0;
      transition: all 0.3s;
    }

    .toast.show { transform: translateY(0); opacity: 1; }
    .toast.success { border-left: 3px solid var(--green); }
    .toast.error { border-left: 3px solid var(--red); }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

    @media (max-width: 768px) {
      .stats-bar { flex-wrap: wrap; }
      .stat-card { min-width: calc(50% - 0.5rem); }
      .form-grid { grid-template-columns: 1fr; }
      th, td { padding: 0.7rem 0.6rem; }
    }
  </style>
</head>
<body>

<div class="app">
  <header>
    <div class="brand">
      <div class="brand-icon">SRV</div>
      <div class="brand-text">
        <h1>Infraestructura</h1>
        <span>Gestió de Servidors</span>
      </div>
    </div>
  </header>

  <div class="stats-bar" id="statsBar">
    <div class="stat-card">
      <div class="stat-label">Servidors</div>
      <div class="stat-value" id="statTotal">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">vCPUs totals</div>
      <div class="stat-value" id="statVcpus">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Memòria total</div>
      <div class="stat-value" id="statMemory">—<span class="stat-unit">GB</span></div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Disc total</div>
      <div class="stat-value" id="statDisk">—<span class="stat-unit">GB</span></div>
    </div>
  </div>

  <div class="toolbar">
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="Cercar servidor..." oninput="filterServers()">
    </div>
    <button class="btn btn-primary" onclick="openModal()">+ Nou Servidor</button>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Name</th>
          <th>vCPUs</th>
          <th>Memory (GB)</th>
          <th>Disk-0 (GB)</th>
          <th>Disk-1 (GB)</th>
          <th>Disk+ (GB)</th>
          <th>Disk Total (GB)</th>
          <th>Servei</th>
          <th>Tipus</th>
          <th>Equip</th>
          <th>Data Baixa</th>
          <th>Accions</th>
        </tr>
      </thead>
      <tbody id="tableBody">
        <tr><td colspan="12"><div class="empty-state"><div class="icon">⟳</div><p>Carregant...</p></div></td></tr>
      </tbody>
    </table>
  </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay" onclick="handleOverlayClick(event)">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle">Nou Servidor</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-grid">
        <div class="form-group full">
          <label>Name *</label>
          <input type="text" id="f_name" placeholder="nom-servidor">
        </div>
        <div class="form-group">
          <label>vCPUs</label>
          <input type="number" id="f_vcpus" min="0" placeholder="0">
        </div>
        <div class="form-group">
          <label>Memory (GB)</label>
          <input type="number" id="f_memory" min="0" placeholder="0">
        </div>
        <div class="form-group">
          <label>Disk-0 (GB)</label>
          <input type="number" id="f_disk0" min="0" placeholder="0" oninput="calcDiskTotal()">
        </div>
        <div class="form-group">
          <label>Disk-1 (GB)</label>
          <input type="number" id="f_disk1" min="0" placeholder="0" oninput="calcDiskTotal()">
        </div>
        <div class="form-group">
          <label>Disk+ (GB)</label>
          <input type="number" id="f_disk_extra" min="0" placeholder="0" oninput="calcDiskTotal()">
        </div>
        <div class="form-group">
          <label>Disk Total (GB)</label>
          <input type="number" id="f_disk_total" min="0" placeholder="0">
          <div class="disk-total-hint" id="diskHint"></div>
        </div>
        <div class="form-group">
          <label>Servei</label>
          <input type="text" id="f_servei" placeholder="ex: postgres+python">
        </div>
        <div class="form-group">
          <label>Tipus</label>
          <input type="text" id="f_tipus" placeholder="ex: Testing, Prod">
        </div>
        <div class="form-group">
          <label>Equip</label>
          <input type="text" id="f_equip" placeholder="ex: Dades">
        </div>
        <div class="form-group">
          <label>Data Baixa</label>
          <input type="date" id="f_data_baixa">
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel·lar</button>
      <button class="btn btn-primary" onclick="saveServer()">Guardar</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
  let allServers = [];
  let editingId = null;

  async function loadServers() {
    const res = await fetch('/api/servers');
    allServers = await res.json();
    renderTable(allServers);
    loadStats();
  }

  async function loadStats() {
    const res = await fetch('/api/stats');
    const s = await res.json();
    document.getElementById('statTotal').textContent = s.total_servers;
    document.getElementById('statVcpus').textContent = s.total_vcpus || 0;
    document.getElementById('statMemory').innerHTML = `${s.total_memory_gb || 0}<span class="stat-unit">GB</span>`;
    document.getElementById('statDisk').innerHTML = `${s.total_disk_gb || 0}<span class="stat-unit">GB</span>`;
  }

  function renderTable(servers) {
    const tbody = document.getElementById('tableBody');
    if (!servers.length) {
      tbody.innerHTML = `<tr><td colspan="12"><div class="empty-state"><div class="icon">◌</div><p>No s'han trobat servidors</p></div></td></tr>`;
      return;
    }

    tbody.innerHTML = servers.map(s => `
      <tr>
        <td><span class="cell-name">${s.name}</span></td>
        <td class="cell-num">${s.vcpus}</td>
        <td class="cell-num">${s.memory}</td>
        <td class="cell-num ${s.disk0 === 0 ? 'zero' : ''}">${s.disk0}</td>
        <td class="cell-num ${s.disk1 === 0 ? 'zero' : ''}">${s.disk1 || '—'}</td>
        <td class="cell-num ${s.disk_extra === 0 ? 'zero' : ''}">${s.disk_extra || '—'}</td>
        <td class="cell-num"><strong>${s.disk_total}</strong></td>
        <td>${s.servei ? `<span class="badge badge-servei">${s.servei}</span>` : '<span style="color:var(--text-muted)">—</span>'}</td>
        <td>${s.tipus ? `<span class="badge badge-tipus">${s.tipus}</span>` : '<span style="color:var(--text-muted)">—</span>'}</td>
        <td>${s.equip ? `<span class="badge badge-equip">${s.equip}</span>` : '<span style="color:var(--text-muted)">—</span>'}</td>
        <td style="font-family:var(--mono);font-size:0.8rem;color:${s.data_baixa ? 'var(--yellow)' : 'var(--text-muted)'}">${s.data_baixa || '—'}</td>
        <td>
          <div class="actions">
            <button class="icon-btn edit" onclick="editServer(${s.id})" title="Editar">✎</button>
            <button class="icon-btn delete" onclick="deleteServer(${s.id}, '${s.name}')" title="Eliminar">✕</button>
          </div>
        </td>
      </tr>
    `).join('');
  }

  function filterServers() {
    const q = document.getElementById('searchInput').value.toLowerCase();
    const filtered = allServers.filter(s =>
      s.name.toLowerCase().includes(q) ||
      (s.servei || '').toLowerCase().includes(q) ||
      (s.tipus || '').toLowerCase().includes(q) ||
      (s.equip || '').toLowerCase().includes(q)
    );
    renderTable(filtered);
  }

  function openModal(server = null) {
    editingId = server ? server.id : null;
    document.getElementById('modalTitle').textContent = server ? `Editar: ${server.name}` : 'Nou Servidor';
    document.getElementById('f_name').value = server?.name || '';
    document.getElementById('f_vcpus').value = server?.vcpus || '';
    document.getElementById('f_memory').value = server?.memory || '';
    document.getElementById('f_disk0').value = server?.disk0 || '';
    document.getElementById('f_disk1').value = server?.disk1 || '';
    document.getElementById('f_disk_extra').value = server?.disk_extra || '';
    document.getElementById('f_disk_total').value = server?.disk_total || '';
    document.getElementById('f_servei').value = server?.servei || '';
    document.getElementById('f_tipus').value = server?.tipus || '';
    document.getElementById('f_equip').value = server?.equip || '';
    document.getElementById('f_data_baixa').value = server?.data_baixa || '';
    document.getElementById('diskHint').textContent = '';
    document.getElementById('modalOverlay').classList.add('open');
    setTimeout(() => document.getElementById('f_name').focus(), 100);
  }

  function closeModal() {
    document.getElementById('modalOverlay').classList.remove('open');
    editingId = null;
  }

  function handleOverlayClick(e) {
    if (e.target === document.getElementById('modalOverlay')) closeModal();
  }

  function calcDiskTotal() {
    const d0 = parseInt(document.getElementById('f_disk0').value) || 0;
    const d1 = parseInt(document.getElementById('f_disk1').value) || 0;
    const de = parseInt(document.getElementById('f_disk_extra').value) || 0;
    const total = d0 + d1 + de;
    document.getElementById('f_disk_total').value = total || '';
    document.getElementById('diskHint').textContent = total ? `Calculat: ${d0} + ${d1} + ${de} = ${total} GB` : '';
  }

  async function saveServer() {
    const name = document.getElementById('f_name').value.trim();
    if (!name) { showToast('El nom és obligatori', 'error'); return; }

    const payload = {
      name,
      vcpus: parseInt(document.getElementById('f_vcpus').value) || 0,
      memory: parseInt(document.getElementById('f_memory').value) || 0,
      disk0: parseInt(document.getElementById('f_disk0').value) || 0,
      disk1: parseInt(document.getElementById('f_disk1').value) || 0,
      disk_extra: parseInt(document.getElementById('f_disk_extra').value) || 0,
      disk_total: parseInt(document.getElementById('f_disk_total').value) || 0,
      servei: document.getElementById('f_servei').value.trim(),
      tipus: document.getElementById('f_tipus').value.trim(),
      equip: document.getElementById('f_equip').value.trim(),
      data_baixa: document.getElementById('f_data_baixa').value,
    };

    const url = editingId ? `/api/servers/${editingId}` : '/api/servers';
    const method = editingId ? 'PUT' : 'POST';

    const res = await fetch(url, {
      method,
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });

    const data = await res.json();
    if (!res.ok) { showToast(data.error || 'Error', 'error'); return; }

    closeModal();
    showToast(editingId ? 'Servidor actualitzat ✓' : 'Servidor creat ✓', 'success');
    await loadServers();
  }

  async function editServer(id) {
    const server = allServers.find(s => s.id === id);
    if (server) openModal(server);
  }

  async function deleteServer(id, name) {
    if (!confirm(`Eliminar el servidor "${name}"?`)) return;
    const res = await fetch(`/api/servers/${id}`, { method: 'DELETE' });
    if (res.ok) {
      showToast(`"${name}" eliminat`, 'success');
      await loadServers();
    } else {
      showToast('Error en eliminar', 'error');
    }
  }

  function showToast(msg, type = 'success') {
    const t = document.getElementById('toast');
    t.textContent = (type === 'success' ? '✓ ' : '✕ ') + msg;
    t.className = `toast ${type} show`;
    setTimeout(() => t.classList.remove('show'), 3000);
  }

  // Init
  loadServers();
</script>
</body>
</html>
