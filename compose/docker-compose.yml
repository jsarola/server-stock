services:
  postgres:
    image: postgres:18-alpine
    container_name: postgres18
    restart: unless-stopped
    environment:
      POSTGRES_DB: server_stock
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      PGDATA: /var/lib/postgresql/data
    ports:
      - "5432:5432"
    volumes:
      - ./pg-18/data:/var/lib/postgresql/data
      - ./pg-18/postgresql.conf:/etc/postgresql/postgresql.conf:ro
      - ./pg-18/conf.d:/etc/postgresql/conf.d:ro
    command:
      - postgres
      - -c
      - config_file=/etc/postgresql/postgresql.conf
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d server_stock"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: ..
      dockerfile: compose/app/Dockerfile
    container_name: server_stock_app
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/server_stock
      PORT: 3000
      # LOAD_DEMO_DATA: "true"
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
